name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded in-progress runs for the same ref (saves CI minutes; the
# latest push is what matters).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (Node 22)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm -r build

      - name: Pre-install LadybugDB extensions (avoid parallel-download races)
        run: node scripts/preinstall-extensions.mjs

      # `pnpm -r test` runs every package suite, including the perf/scaling guards:
      # the multi-part release/streaming-install accounting guard and the
      # streaming-loader ~linear edge-creation guard (see docs/ci-perf-guards.md).
      - name: Test (packages + Spike A + perf guards)
        run: pnpm -r test

      - name: Test (root structural suites)
        run: pnpm test:root

  package-tarball:
    name: package (npm pack + clean-room install smoke test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Build the workspace and the self-contained CLI bundle, then produce the
      # installable tarball exactly the way a release would.
      - name: Build workspace
        run: pnpm -r build

      - name: Bundle CLI (dist/wikigr.mjs)
        run: pnpm bundle:cli

      - name: Pack tarball
        run: npm pack --pack-destination "$RUNNER_TEMP"

      # Install the packed tarball into a CLEAN directory with plain npm (NOT
      # pnpm, NOT the workspace) to prove the root package is a correct,
      # self-contained, installable artifact: every externalized runtime import
      # must resolve from the declared dependencies with zero missing modules.
      - name: Install tarball into a clean dir and smoke-test the bin
        run: |
          set -euo pipefail
          tarball="$(ls "$RUNNER_TEMP"/agent-kgpacks-ts-*.tgz)"
          echo "tarball: $tarball"
          consumer="$(mktemp -d)"
          cd "$consumer"
          npm init -y >/dev/null
          npm install "$tarball"
          echo '--- wikigr --help ---'
          npx wikigr --help
          echo '--- wikigr query --help ---'
          npx wikigr query --help

      # `npm publish` from this repo must be blocked unless the downstream
      # private-feed pipeline opts in explicitly. Verify the prepublishOnly guard
      # fails a dry-run publish here, and succeeds only with the opt-in set.
      - name: Assert publish is blocked without the opt-in
        run: |
          set -uo pipefail
          if npm publish --dry-run >/dev/null 2>&1; then
            echo "ERROR: npm publish was NOT blocked" >&2
            exit 1
          fi
          echo "publish correctly blocked without KGPACKS_ALLOW_PUBLISH=1"

  python-free-guard:
    name: python-free guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22

      - name: Fail if any runtime package declares or invokes Python
        run: node scripts/check-no-python.mjs

  dependency-audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Fail the build on any known advisory (moderate+) in the dependency tree,
      # keeping the pinned dependencies clean. Bump the offending dep (or its
      # pnpm override) to clear it.
      - name: Audit dependencies (fail on moderate+)
        run: pnpm audit --audit-level moderate

  docker-image:
    name: docker image (build + no-Python + non-root)
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: '1'
      IMAGE: kgpacks-backend:ci
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Build with the runner-bundled docker (BuildKit). No extra build-driver or
      # other unpinned Action is introduced; the only Action used is the same
      # SHA-pinned actions/checkout as the other jobs. Building on the amd64 runner
      # produces a linux/amd64 image and catches any Dockerfile breakage.
      - name: Build image (linux/amd64)
        run: docker build --platform=linux/amd64 -t "$IMAGE" .

      # The native @ladybugdb/core binding is a direct dependency of @kgpacks/db,
      # so resolve it from that package's directory inside the image.
      - name: Assert the @ladybugdb/core native binding loads
        run: |
          docker run --rm --workdir /app/node_modules/@kgpacks/db --entrypoint node "$IMAGE" \
            -e "require('@ladybugdb/core')"

      # Image-level complement to scripts/check-no-python.mjs: the shipped image
      # must contain no Python interpreter. Entrypoint is overridden so the server
      # (which needs a database) is not started.
      - name: Assert the image contains no Python
        run: |
          docker run --rm --entrypoint sh "$IMAGE" -c '! command -v python && ! command -v python3'

      - name: Assert the runtime user is non-root
        run: |
          uid="$(docker run --rm --entrypoint sh "$IMAGE" -c 'id -u')"
          echo "runtime uid=$uid"
          test "$uid" != "0"
